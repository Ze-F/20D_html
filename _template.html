<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAGE_TITLE · MATH 20D Walkthrough</title>

  <!-- Early theme application (prevents flash) -->
  <script>
    (function () {
      var theme;
      try {
        var stored = localStorage.getItem('theme');
        theme = (stored === 'light' || stored === 'dark') ? stored : null;
      } catch (e) {
        // Private browsing / blocked storage — fall through to system pref.
        theme = null;
      }
      if (!theme) {
        theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
          ? 'dark' : 'light';
      }
      document.documentElement.dataset.theme = theme;
    })();
  </script>

  <link rel="stylesheet" href="assets/style.css">
  <link rel="stylesheet" href="assets/katex/katex.min.css">

  <!-- Order matters: nav.js first (injects DOM), then KaTeX auto-render -->
  <script defer src="assets/nav.js"></script>
  <script defer src="assets/katex/katex.min.js"></script>
  <script defer src="assets/katex/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$',  right: '$',  display: false}
      ],
      throwOnError: false
    });"></script>
</head>
<body>
<div class="app">
  <header class="app-header">
    <span class="course-name">MATH 20D</span>
    <span class="sep">·</span>
    <span class="page-title">PAGE_TITLE</span>
    <button class="theme-toggle" type="button">🌙 Dark</button>
  </header>

  <aside class="sidebar-left"><!-- injected by nav.js --></aside>

  <main class="main">
    <h1>PAGE_TITLE</h1>

    <!-- Notation subsection (per spec §6.3) -->
    <section>
      <h2 id="notation">Notation</h2>
      <p>本文件中 dependent variable 默认记作 $y(t)$ ...（按文件实际情况填写）</p>
    </section>

    <!-- Main content sections go here -->
    <!-- Each section: <section><h2 id="...">...</h2>...</section> -->

  </main>

  <aside class="sidebar-right"><!-- injected by nav.js --></aside>
</div>
</body>
</html>
